<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Instituto Beth Leite - Sem conexão</title>
    <meta name="theme-color" content="#2F855A" />
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #fafafa;
        color: #1f2937;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 480px;
        text-align: center;
      }

      img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        border-radius: 999px;
        background: #2f855a;
        color: #fff;
        font-weight: 700;
        padding: 12px 18px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <h1>Sem conexão no momento</h1>
      <p>Quando a internet voltar, toque no botão abaixo para tentar carregar o site novamente.</p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
